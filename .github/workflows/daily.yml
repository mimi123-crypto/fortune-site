name: 占いサイト毎日更新

# 毎日 日本時間 00:10 に自動生成（cronはUTC。15:10 UTC = 翌00:10 JST）
# 手動実行（workflow_dispatch）もできる。
on:
  schedule:
    - cron: "10 15 * * *"
  workflow_dispatch:

# docs/ をコミットして戻すために書き込み権限が必要
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo          # date.today() を日本時間にする
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存をインストール
        run: pip install pyswisseph

      - name: サイトを生成（docs/ へ出力）
        run: python build_site.py --out docs

      - name: 変更があれば docs/ をコミットして push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain -- docs)" ]; then
            git add docs
            git commit -m "daily fortune update $(date +%Y-%m-%d)"
            git push
          else
            echo "docs/ に変更なし。スキップ。"
          fi
